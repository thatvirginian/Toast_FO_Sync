name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  # Allows manual trigger from the Actions tab for testing
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Log in to Docker Hub ────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 3. Set up Docker Buildx (enables layer caching) ────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Build and push ──────────────────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Two tags on every build:
          #   latest    → always points to the most recent main build
          #   <sha>     → pinned tag for rollback or Azure Container App deploy
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/toastfuturesync:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/toastfuturesync:${{ github.sha }}
          # Cache layers between runs to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
